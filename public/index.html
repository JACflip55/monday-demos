<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Angel Investor Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      color: white;
      margin-bottom: 40px;
      text-align: center;
    }

    header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    header p {
      font-size: 1.1em;
      opacity: 0.95;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .summary-card {
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .summary-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    }

    .summary-label {
      color: #666;
      font-size: 0.9em;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .summary-value {
      color: #667eea;
      font-size: 2em;
      font-weight: 700;
    }

    .deals-section {
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      margin-bottom: 40px;
    }

    .section-title {
      font-size: 1.5em;
      color: #333;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .deals-table {
      width: 100%;
      border-collapse: collapse;
    }

    .deals-table thead {
      background: #f5f5f5;
      border-bottom: 2px solid #667eea;
    }

    .deals-table th {
      padding: 15px;
      text-align: left;
      font-weight: 600;
      color: #333;
      text-transform: uppercase;
      font-size: 0.85em;
      letter-spacing: 0.5px;
    }

    .deals-table td {
      padding: 15px;
      border-bottom: 1px solid #eee;
      color: #555;
    }

    .deals-table tbody tr:hover {
      background: #f9f9f9;
    }

    .deal-name {
      font-weight: 600;
      color: #667eea;
      cursor: pointer;
    }

    .deal-name:hover {
      text-decoration: underline;
    }

    .stage-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85em;
      font-weight: 600;
      text-transform: uppercase;
    }

    .stage-seed {
      background: #ffeaa7;
      color: #d63031;
    }

    .stage-series-a {
      background: #a29bfe;
      color: #2d3436;
    }

    .stage-series-b {
      background: #74b9ff;
      color: #2d3436;
    }

    .status-active {
      color: #27ae60;
      font-weight: 600;
    }

    .status-exited {
      color: #2980b9;
      font-weight: 600;
    }

    .add-deal-form {
      background: #f9f9f9;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 30px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-bottom: 15px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-size: 0.85em;
      color: #666;
      margin-bottom: 5px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .form-group input {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.95em;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      font-size: 0.85em;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #ddd;
      color: #333;
      margin-left: 10px;
    }

    .btn-secondary:hover {
      background: #ccc;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
    }

    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background-color: white;
      padding: 30px;
      border-radius: 12px;
      max-width: 600px;
      width: 90%;
      box-shadow: 0 15px 50px rgba(0,0,0,0.3);
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        transform: translateY(-50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 2px solid #f0f0f0;
      padding-bottom: 15px;
    }

    .modal-header h2 {
      color: #333;
      font-size: 1.5em;
    }

    .close {
      font-size: 2em;
      font-weight: bold;
      color: #aaa;
      cursor: pointer;
      background: none;
      border: none;
    }

    .close:hover {
      color: #000;
    }

    .opportunities-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .opportunity-card {
      background: #f8f9ff;
      border-left: 4px solid #667eea;
      padding: 20px;
      border-radius: 8px;
      transition: transform 0.3s;
    }

    .opportunity-card:hover {
      transform: translateX(5px);
    }

    .opportunity-title {
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
      font-size: 1.1em;
    }

    .opportunity-detail {
      font-size: 0.9em;
      color: #666;
      margin-bottom: 8px;
    }

    .no-data {
      text-align: center;
      padding: 40px;
      color: #999;
      font-style: italic;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .success-message {
      background: #d4edda;
      color: #155724;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      border-left: 4px solid #28a745;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🚀 Angel Investor Dashboard</h1>
      <p>Track your portfolio, follow-on opportunities, and investor returns</p>
    </header>

    <div class="summary-grid" id="summaryGrid">
      <div class="loading">
        <div class="spinner"></div>
        Loading portfolio data...
      </div>
    </div>

    <div class="deals-section">
      <h2 class="section-title">📊 Active Deals</h2>
      <div id="successMessage"></div>
      
      <div class="add-deal-form">
        <h3 style="margin-bottom: 15px; color: #333;">Add New Deal</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>Company Name</label>
            <input type="text" id="dealName" placeholder="e.g., TechFlow">
          </div>
          <div class="form-group">
            <label>Stage</label>
            <input type="text" id="dealStage" placeholder="seed, series-a, etc." value="seed">
          </div>
          <div class="form-group">
            <label>Valuation ($)</label>
            <input type="number" id="dealValuation" placeholder="8000000">
          </div>
          <div class="form-group">
            <label>Invested ($)</label>
            <input type="number" id="dealInvested" placeholder="100000">
          </div>
          <div class="form-group">
            <label>Ownership %</label>
            <input type="number" id="dealOwnership" placeholder="1.25" step="0.01">
          </div>
          <div class="form-group">
            <label>Date Invested</label>
            <input type="date" id="dealDate">
          </div>
        </div>
        <div class="form-group">
          <label>Notes</label>
          <input type="text" id="dealNotes" placeholder="Founding team, product stage, etc." style="width: 100%;">
        </div>
        <button class="btn btn-primary" onclick="addDeal()">Add Deal</button>
      </div>

      <table class="deals-table">
        <thead>
          <tr>
            <th>Company</th>
            <th>Stage</th>
            <th>Valuation</th>
            <th>Investment</th>
            <th>Ownership</th>
            <th>Date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="dealsTableBody">
          <tr>
            <td colspan="7" class="loading">Loading deals...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="deals-section">
      <h2 class="section-title">📈 Follow-On Opportunities</h2>
      <div id="opportunitiesContainer" class="opportunities-grid">
        <div class="loading">Loading opportunities...</div>
      </div>
    </div>
  </div>

  <!-- Deal Details Modal -->
  <div class="modal" id="dealModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Deal Details</h2>
        <button class="close" onclick="closeDealModal()">&times;</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    let allDeals = [];

    async function loadData() {
      try {
        const [dealsRes, summaryRes] = await Promise.all([
          fetch('/api/deals'),
          fetch('/api/summary')
        ]);

        allDeals = await dealsRes.json();
        const summary = await summaryRes.json();

        renderSummary(summary);
        renderDeals(allDeals);
        renderOpportunities(allDeals);
      } catch (error) {
        console.error('Error loading data:', error);
      }
    }

    function renderSummary(summary) {
      const grid = document.getElementById('summaryGrid');
      grid.innerHTML = `
        <div class="summary-card">
          <div class="summary-label">Total Deals</div>
          <div class="summary-value">${summary.totalDeals}</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">Active Deals</div>
          <div class="summary-value">${summary.activeDeals}</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">Total Invested</div>
          <div class="summary-value">$${(summary.totalInvested / 1000).toFixed(0)}K</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">Avg Ownership</div>
          <div class="summary-value">${summary.averageOwnership.toFixed(2)}%</div>
        </div>
      `;
    }

    function renderDeals(deals) {
      const tbody = document.getElementById('dealsTableBody');
      if (deals.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="no-data">No deals yet. Add one above!</td></tr>';
        return;
      }

      tbody.innerHTML = deals.map(deal => `
        <tr onclick="openDealModal(${deal.id})">
          <td class="deal-name">${deal.name}</td>
          <td><span class="stage-badge stage-${deal.stage || 'seed'}">${deal.stage || 'N/A'}</span></td>
          <td>$${deal.valuation ? (deal.valuation / 1000000).toFixed(1) : '-'}M</td>
          <td>$${deal.invested_amount ? (deal.invested_amount / 1000).toFixed(0) : '-'}K</td>
          <td>${deal.ownership_percent ? deal.ownership_percent.toFixed(2) : '-'}%</td>
          <td>${deal.date_invested ? new Date(deal.date_invested).toLocaleDateString() : '-'}</td>
          <td class="status-${deal.status}">${deal.status}</td>
        </tr>
      `).join('');
    }

    function renderOpportunities(deals) {
      const container = document.getElementById('opportunitiesContainer');
      let html = '';

      deals.forEach(deal => {
        if (deal.followOns && deal.followOns.length > 0) {
          deal.followOns.forEach(followOn => {
            html += `
              <div class="opportunity-card">
                <div class="opportunity-title">${deal.name} - ${followOn.round_name}</div>
                <div class="opportunity-detail"><strong>New Valuation:</strong> $${(followOn.valuation / 1000000).toFixed(1)}M</div>
                <div class="opportunity-detail"><strong>Available Allocation:</strong> $${(followOn.available_allocation / 1000).toFixed(0)}K</div>
                <div class="opportunity-detail"><strong>Date:</strong> ${new Date(followOn.date_opportunity).toLocaleDateString()}</div>
                <div class="opportunity-detail"><strong>Note:</strong> ${followOn.notes}</div>
              </div>
            `;
          });
        }
      });

      if (html === '') {
        container.innerHTML = '<div class="no-data">No follow-on opportunities yet</div>';
      } else {
        container.innerHTML = html;
      }
    }

    async function addDeal() {
      const name = document.getElementById('dealName').value;
      const stage = document.getElementById('dealStage').value;
      const valuation = parseFloat(document.getElementById('dealValuation').value) || 0;
      const invested = parseFloat(document.getElementById('dealInvested').value);
      const ownership = parseFloat(document.getElementById('dealOwnership').value) || 0;
      const date = document.getElementById('dealDate').value || new Date().toISOString().split('T')[0];
      const notes = document.getElementById('dealNotes').value;

      if (!name || !invested) {
        alert('Please fill in Company Name and Investment Amount');
        return;
      }

      try {
        const res = await fetch('/api/deals', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, stage, valuation, invested_amount: invested, ownership_percent: ownership, date_invested: date, notes })
        });

        if (res.ok) {
          showSuccess('Deal added successfully!');
          document.getElementById('dealName').value = '';
          document.getElementById('dealValuation').value = '';
          document.getElementById('dealInvested').value = '';
          document.getElementById('dealOwnership').value = '';
          document.getElementById('dealNotes').value = '';
          loadData();
        }
      } catch (error) {
        alert('Error adding deal: ' + error.message);
      }
    }

    function showSuccess(msg) {
      const container = document.getElementById('successMessage');
      container.innerHTML = `<div class="success-message">${msg}</div>`;
      setTimeout(() => {
        container.innerHTML = '';
      }, 3000);
    }

    function openDealModal(dealId) {
      const deal = allDeals.find(d => d.id === dealId);
      if (!deal) return;

      const modalBody = document.getElementById('modalBody');
      document.getElementById('modalTitle').textContent = deal.name;

      let exitInfo = '';
      if (deal.exits && deal.exits.length > 0) {
        const exit = deal.exits[0];
        exitInfo = `
          <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee;">
            <h4 style="color: #667eea; margin-bottom: 10px;">Exit Information</h4>
            <p><strong>Type:</strong> ${exit.type}</p>
            <p><strong>Exit Date:</strong> ${new Date(exit.exit_date).toLocaleDateString()}</p>
            <p><strong>Proceeds:</strong> $${(exit.proceeds / 1000).toFixed(0)}K</p>
            <p><strong>ROI Multiple:</strong> ${exit.roi_multiple}x</p>
          </div>
        `;
      }

      modalBody.innerHTML = `
        <div>
          <p><strong>Stage:</strong> ${deal.stage}</p>
          <p><strong>Valuation:</strong> $${deal.valuation ? (deal.valuation / 1000000).toFixed(1) : '-'}M</p>
          <p><strong>Your Investment:</strong> $${deal.invested_amount ? (deal.invested_amount / 1000).toFixed(0) : '-'}K</p>
          <p><strong>Ownership:</strong> ${deal.ownership_percent?.toFixed(2) || '-'}%</p>
          <p><strong>Date Invested:</strong> ${deal.date_invested ? new Date(deal.date_invested).toLocaleDateString() : '-'}</p>
          <p><strong>Status:</strong> ${deal.status}</p>
          <p><strong>Notes:</strong> ${deal.notes || 'No notes'}</p>
          ${exitInfo}
        </div>
      `;
      document.getElementById('dealModal').classList.add('active');
    }

    function closeDealModal() {
      document.getElementById('dealModal').classList.remove('active');
    }

    // Set today's date as default
    document.getElementById('dealDate').valueAsDate = new Date();

    // Load data on page load
    loadData();
  </script>
</body>
</html>
